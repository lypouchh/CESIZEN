name: ${COMPOSE_PROJECT_NAME:-cesizen-prod}

services:
  mysql:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-cesizen-prod}-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "127.0.0.1:${DB_PORT:-3308}:3306"
    volumes:
      - cesizen-prod-db:/var/lib/mysql
    networks:
      - cesizen-network-prod
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Frontend : build statique servi par Nginx, image immuable poussée par la CD.
  # Stateless -> pas de bascule blue/green nécessaire, un simple redéploiement suffit.
  frontend:
    image: ghcr.io/lypouchh/cesizen-frontend:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-cesizen-prod}-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5175}:80"
    networks:
      - cesizen-network-prod
    security_opt:
      - no-new-privileges:true

networks:
  cesizen-network-prod:
    driver: bridge

volumes:
  cesizen-prod-db:
    driver: local
