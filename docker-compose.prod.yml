version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cesizen-mysql-prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks:
      - cesizen-network-prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cesizen-laravel-prod
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./backend:/app
    networks:
      - cesizen-network-prod

  nginx:
    image: nginx:alpine
    container_name: cesizen-nginx-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./backend:/app
      - ./backend/docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - laravel
    networks:
      - cesizen-network-prod

networks:
  cesizen-network-prod:
    driver: bridge

volumes:
  mysql_data_prod:
    driver: local
