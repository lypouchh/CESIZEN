name: Incident
about: Declarer un incident securite ou disponibilite
title: "[INCIDENT] "
labels: ["bug", "securite", "priorite:critique"]
description: Ticket incident avec severite et objectif SLA.
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severite
      options:
        - S1 - Critique
        - S2 - Forte
        - S3 - Mineure
    validations:
      required: true

  - type: dropdown
    id: sla
    attributes:
      label: SLA cible
      options:
        - S1 - prise en charge immediate (moins de 1h)
        - S2 - prise en charge dans la journee
        - S3 - prise en charge sous 72h
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: Module concerne
      placeholder: Comptes, Informations, Exercices...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Etapes de reproduction
      description: Liste numerotee claire
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Observer ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Resultat attendu
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Resultat observe
    validations:
      required: true

  - type: textarea
    id: traces
    attributes:
      label: Logs, captures, contexte
      description: Ajouter les preuves utiles (logs, stacktrace, capture ecran).

  - type: textarea
    id: remediation
    attributes:
      label: Correctif / mitigation propose
      description: Decrire le plan de contournement puis le correctif permanent.
