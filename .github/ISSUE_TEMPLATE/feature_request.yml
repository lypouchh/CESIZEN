name: Demande d'evolution
about: Proposer une evolution fonctionnelle, technique ou dette technique
title: "[EVOLUTION] "
labels: ["evolution", "priorite:forte"]
description: Ticket d'evolution avec delai et cout estimes.
body:
  - type: input
    id: module
    attributes:
      label: Module concerne
      placeholder: Comptes, Informations, Exercices...
    validations:
      required: true

  - type: textarea
    id: need
    attributes:
      label: Besoin metier
      description: Quel probleme utilisateur veut-on resoudre ?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution proposee
      description: Fonctionnement attendu, contraintes UX/techniques.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Criteres d'acceptation
      placeholder: |
        - [ ] Critere 1
        - [ ] Critere 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priorite
      options:
        - priorite:critique
        - priorite:forte
        - priorite:mineure
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: Delai souhaite
      placeholder: Ex. 2 sprints / avant le 31-07-2026
    validations:
      required: true

  - type: dropdown
    id: cost
    attributes:
      label: Cout estime
      options:
        - faible (moins de 1 jour)
        - moyen (1 a 3 jours)
        - eleve (plus de 3 jours)
    validations:
      required: true
