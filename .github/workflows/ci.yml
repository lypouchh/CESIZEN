name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret-ci-test-secret
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite
          coverage: pcov
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run backend tests
        run: php artisan test

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  sonarcloud:
    if: ${{ vars.SONAR_CI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORG: ${{ secrets.SONAR_ORG }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

    steps:
      - name: Check SonarCloud secrets
        id: sonar_ready
        run: |
          if [[ -n "$SONAR_TOKEN" && -n "$SONAR_ORG" && -n "$SONAR_PROJECT_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarCloud secrets missing; skipping Sonar scan and Quality Gate."
          fi

      - name: Checkout
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: SonarCloud Scan
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=backend/app,backend/routes,frontend/src
            -Dsonar.tests=backend/tests,frontend/src
            -Dsonar.test.inclusions=backend/tests/**/*.php,frontend/src/**/*.test.jsx
            -Dsonar.exclusions=backend/vendor/**,frontend/node_modules/**,backend/storage/**,backend/bootstrap/cache/**,frontend/dist/**
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Quality Gate
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
