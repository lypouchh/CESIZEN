name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: [self-hosted, linux]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
    env:
      JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret-ci-test-secret
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show PHP runtime
        run: php -v

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run backend tests
        run: php artisan test

  frontend-quality:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  migration-sql:
    runs-on: [self-hosted, linux]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
    needs: [backend-tests, frontend-quality]
    env:
      JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret-ci-test-secret
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show PHP runtime
        run: php -v

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate SQL migration script (CI only)
        run: |
          bash ../scripts/generate-migration-sql.sh

      - name: Upload SQL migration artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: migration-sql-script
          path: backend/artifacts/migration.sql
          if-no-files-found: error
          retention-days: 14

  sonarcloud:
    runs-on: [self-hosted, linux]
    needs: [backend-tests, frontend-quality]
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORG: ${{ secrets.SONAR_ORG }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

    steps:
      - name: Check SonarCloud secrets
        id: sonar_ready
        run: |
          if [[ -n "$SONAR_TOKEN" && -n "$SONAR_ORG" && -n "$SONAR_PROJECT_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarCloud secrets missing; skipping Sonar scan and Quality Gate."
          fi

      - name: Checkout
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Setup Java
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: SonarCloud Scan
        id: sonar_scan
        continue-on-error: true
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=backend/app,backend/routes,frontend/src
            -Dsonar.tests=backend/tests,frontend/src
            -Dsonar.test.inclusions=backend/tests/**/*.php,frontend/src/**/*.test.jsx
            -Dsonar.exclusions=backend/vendor/**,frontend/node_modules/**,backend/storage/**,backend/bootstrap/cache/**,frontend/dist/**
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Quality Gate
        if: ${{ steps.sonar_ready.outputs.enabled == 'true' && steps.sonar_scan.outcome == 'success' }}
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

  dependency-audit:
    runs-on: [self-hosted, linux]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: [backend-tests, frontend-quality]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Audit backend dependencies
        working-directory: backend
        run: composer audit --no-interaction --ignore-severity=low

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=critical

  docker-image:
    runs-on: [self-hosted, linux]
    needs: [backend-tests, frontend-quality, migration-sql, dependency-audit]
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
    env:
      DOCKER_CONFIG: /tmp/.docker-${{ github.run_id }}-${{ github.run_attempt }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare isolated Docker config
        run: |
          mkdir -p "$DOCKER_CONFIG"
          printf '{"auths":{}}\n' > "$DOCKER_CONFIG/config.json"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ghcr.io/${{ github.repository_owner }}/cesizen-backend
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test pushed image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/cesizen-backend:${{ github.ref_name }}"
          for attempt in 1 2 3 4 5; do
            if docker pull "$IMAGE"; then
              break
            fi

            if [[ "$attempt" -eq 5 ]]; then
              echo "Docker image $IMAGE is still unavailable after 5 attempts."
              exit 1
            fi

            echo "Docker image $IMAGE is not available yet, retrying..."
            sleep 10
          done
          docker run --rm "$IMAGE" php artisan --version

  docker-security-scan:
    runs-on: [self-hosted, linux]
    needs: [docker-image]
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cesizen-backend:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  deploy-bluegreen:
    runs-on: [self-hosted, linux]
    needs: [docker-image, docker-security-scan]
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
    env:
      DB_DATABASE: cesizen
      DB_USERNAME: cesizen_user
      DB_PASSWORD: password
      BLUEGREEN_PROXY_URL: http://localhost:8080
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download migration artifact
        uses: actions/download-artifact@v8
        with:
          name: migration-sql-script
          path: backend/artifacts

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy blue/green stack
        run: |
          chmod +x scripts/bluegreen-deploy.sh
          bash scripts/bluegreen-deploy.sh
