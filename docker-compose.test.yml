name: ${COMPOSE_PROJECT_NAME:-cesizen-test}

services:
  # Service MySQL pour la base de données
  mysql:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-cesizen-test}-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cesizen_test}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME:-cesizen_user}
    ports:
      - "127.0.0.1:${DB_PORT:-3307}:3306"
    volumes:
      - cesizen-test-db:/var/lib/mysql
    networks:
      - cesizen-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Service PHP-FPM pour le backend Laravel : image immuable poussée par la CD
  laravel:
    image: ghcr.io/lypouchh/cesizen-backend:${IMAGE_TAG:-test}
    container_name: ${COMPOSE_PROJECT_NAME:-cesizen-test}-laravel
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-cesizen_test}
      - DB_USERNAME=${DB_USERNAME:-cesizen_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_TTL=${JWT_TTL:-15}
      - JWT_REFRESH_TOKEN_TTL=${JWT_REFRESH_TOKEN_TTL:-10080}
    networks:
      - cesizen-network
    security_opt:
      - no-new-privileges:true

  # Reverse proxy Nginx vers l'API (fastcgi -> laravel:9000)
  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-cesizen-test}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8001}:80"
    volumes:
      - ./backend:/app:ro
      - ./backend/docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - laravel
    networks:
      - cesizen-network
    security_opt:
      - no-new-privileges:true

  # Frontend : build statique servi par Nginx, image immuable poussée par la CD
  frontend:
    image: ghcr.io/lypouchh/cesizen-frontend:${IMAGE_TAG:-test}
    container_name: ${COMPOSE_PROJECT_NAME:-cesizen-test}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    networks:
      - cesizen-network
    security_opt:
      - no-new-privileges:true

networks:
  cesizen-network:
    driver: bridge

volumes:
  cesizen-test-db:
    driver: local
